name: Validate Orchestrator Contracts and Tests

on:
  push:
    branches: [main]
    paths:
      - '.claude/agents/**'
      - '.claude/specialists/**'
      - 'scripts/validate-orchestrator-dispatch.js'
      - 'scripts/test-orchestrator-validator.mjs'
      - 'scripts/test-markdown-scanner.mjs'
      - '.github/scripts/markdown-a11y-lint.mjs'
      - '.github/workflows/validate-orchestrator-contracts.yml'
  pull_request:
    paths:
      - '.claude/agents/**'
      - '.claude/specialists/**'
      - 'scripts/validate-orchestrator-dispatch.js'
      - 'scripts/test-orchestrator-validator.mjs'
      - 'scripts/test-markdown-scanner.mjs'
      - '.github/scripts/markdown-a11y-lint.mjs'
      - '.github/workflows/validate-orchestrator-contracts.yml'

jobs:
  validate-dispatch-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Validate orchestrator-specialist dispatch contracts
        run: node scripts/validate-orchestrator-dispatch.js

      - name: Run markdown scanner unit tests
        run: node scripts/test-markdown-scanner.mjs

      - name: Run orchestrator validator integration tests
        run: node scripts/test-orchestrator-validator.mjs
